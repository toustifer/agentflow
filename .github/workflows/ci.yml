name: agentflow CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Unit tests
        run: go test ./pkg/...
      - name: Build
        run: go build -o bin/agentflow${{ matrix.os == 'windows' && '.exe' || '' }} ./cmd/agentflow/
      - name: Smoke test (MCP communication)
        if: matrix.os == 'ubuntu-latest'
        run: |
          go build -o bin/mcp_comm_check ./smoke/mcp_comm_check.go
          AGENTFLOW_BIN=./bin/agentflow ./bin/mcp_comm_check
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: agentflow-${{ matrix.os }}
          path: bin/agentflow${{ matrix.os == 'windows' && '.exe' || '' }}
